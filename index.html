<style>
  :root{--paper:#F7F6F1;--card:#FFFFFF;--ink:#26301F;--ink2:#5A6352;--line:#E3E2D8;--accent:#38684A;--neg:#A8432E}
  @media (prefers-color-scheme: dark){:root{--paper:#1B1F19;--card:#242A21;--ink:#E8EAE2;--ink2:#B4BCA9;--line:#37402F;--accent:#7FB694;--neg:#E08A6F}}
  :root[data-theme="dark"]{--paper:#1B1F19;--card:#242A21;--ink:#E8EAE2;--ink2:#B4BCA9;--line:#37402F;--accent:#7FB694;--neg:#E08A6F}

       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gate{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:34px 30px;max-width:360px;width:100%;text-align:center}

  .gate h1{font-family:Georgia,serif;font-size:1.25rem;margin:0 0 4px;text-wrap:balance}
  .gate p{color:var(--ink2);font-size:.88rem;margin:0 0 18px}
  .gate input{width:100%;padding:10px 12px;font-size:1rem;border:1px solid var(--line);border-radius:6px;
              background:var(--paper);color:var(--ink);margin-bottom:12px;box-sizing:border-box}
  .gate input:focus{outline:2px solid var(--accent);outline-offset:1px}
  .gate button{width:100%;padding:10px;font-size:1rem;font-weight:600;border:none;border-radius:6px;
               background:var(--accent);color:var(--card);cursor:pointer}
  .gate button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .err{color:var(--neg);font-size:.85rem;min-height:1.3em;margin-top:10px}
</style>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function abrir(){
  const err = document.getElementById('err');
  err.textContent = '';
  const pw = document.getElementById('pw').value;
  if(!pw){ err.textContent = 'Escribí la clave.'; return; }
  try{
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(P.s), iterations:P.n, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plano = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.i)}, key, b64(P.c));
    const html = new TextDecoder().decode(plano);
    document.open(); document.write(html); document.close();
  }catch(e){
    err.textContent = 'Clave incorrecta. Probá de nuevo.';
  }
}
document.getElementById('go').addEventListener('click', abrir);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') abrir(); });
